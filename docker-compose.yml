services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wallet_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["sh", "scripts/docker_start.sh"]
    environment:
      ENVIRONMENT: development
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/wallet_saas
      SECRET_KEY: dev-docker-secret-change-me
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      EMAILS_ENABLED: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_API_PREFIX: /api/v1
        VITE_APP_NAME: Wallet SaaS
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
